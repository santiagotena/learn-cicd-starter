name: ci

on:
  pull_request:
    branches: [main]

jobs: |
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Unit tests
        run: |
          go test -cover ./...
          exit 0

   style:
      name: Style
      runs-on: ubuntu-latest

   steps:
      - name: Format check
        run: test -z $(go fmt ./...)
